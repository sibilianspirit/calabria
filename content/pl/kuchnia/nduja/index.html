<p>Ognista, smarowalna salami wieprzowa ze Spilingi. Robiona z wieprzowiny i hojnej porcji kalabryjskiego peperoncino, 'nduja podbiła świat kulinarny. Smaruj na chlebie, rozpuszczaj w makaronie lub dodawaj do pizzy.</p>
