baseURL = "https://bestofcalabria.com/"
title = "Best of Calabria"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
enableRobotsTXT = true

[languages]
  [languages.en]
    languageName = "English"
    weight = 1
    title = "Best of Calabria"
    languageCode = "en"
    contentDir = "content/en"
  [languages.pl]
    languageName = "Polski"
    weight = 2
    title = "Best of Calabria"
    languageCode = "pl"
    contentDir = "content/pl"
    [languages.pl.params]
      description = "Odkryj najlepsze miejsca Kalabrii – piękne plaże, starożytne miasteczka i autentyczną kuchnię południowych Włoch."

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[params]
  description = "Discover the best of Calabria – stunning beaches, ancient towns, and authentic Italian cuisine in southern Italy's hidden gem."
