{{ define "main" }}
<article class="page-content">
  <div class="container">
    <h1>{{ .Title }}</h1>
    {{ .Content }}
    {{ if .Pages }}
    <div class="page-list">
      {{ range .Pages }}
      <div class="page-card">
        <a href="{{ .RelPermalink }}">
          <h2>{{ .Title }}</h2>
          {{ with .Description }}<p>{{ . }}</p>{{ end }}
        </a>
      </div>
      {{ end }}
    </div>
    {{ end }}
  </div>
</article>
{{ end }}
