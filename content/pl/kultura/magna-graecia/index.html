<p>Od VIII w. p.n.e. greccy koloniści zakładali miasta na terenie południowej Kalabrii — Rhegion (Reggio), Kroton (Crotone), Locri, Sybaris. Ich dziedzictwo żyje w archeologii, języku i kulturze.</p>
