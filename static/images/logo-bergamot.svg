<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 50" fill="#2A2520">
  <!-- Bergamot fruit icon (fine line botanical style) -->
  <g transform="translate(0, 5)">
    <!-- Fruit body -->
    <ellipse cx="20" cy="22" rx="14" ry="13" fill="none" stroke="#2A2520" stroke-width="1.5"/>
    <!-- Stem -->
    <path d="M20 9 L20 3" stroke="#2A2520" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Leaf -->
    <path d="M20 5 Q28 -2 32 6 Q26 8 20 5Z" fill="#2A2520" opacity="0.8"/>
    <!-- Fruit detail lines (segments) -->
    <path d="M13 15 Q20 20 27 15" fill="none" stroke="#2A2520" stroke-width="0.8" opacity="0.4"/>
    <path d="M11 20 Q20 26 29 20" fill="none" stroke="#2A2520" stroke-width="0.8" opacity="0.4"/>
    <!-- Small dot (navel) -->
    <circle cx="20" cy="33" r="1.2" fill="#2A2520" opacity="0.5"/>
  </g>
  <!-- Text -->
  <text x="44" y="22" font-family="'Bodoni Moda', 'Didot', 'Georgia', serif" font-size="22" font-weight="700" letter-spacing="0.5">Best of</text>
  <text x="44" y="42" font-family="'Montserrat', 'Helvetica', sans-serif" font-size="13" font-weight="600" letter-spacing="5">CALABRIA</text>
</svg>