<p>Tartufo di Pizzo (oryginał!), zeppole (smażone ciasto), grattachecca (granita), cudduraci (wielkanocne ciastka) i oczywiście świeże arancini. Scena street food Kalabrii jest bezpretensjonalna i pyszna.</p>
