{{ define "main" }}
<div class="container">
  <h1>{{ .Title }}</h1>
  {{ .Content }}
  <div class="page-list">
    {{ range .Pages }}
    <div class="page-card">
      <a href="{{ .RelPermalink }}">
        <h2>{{ .Title }}</h2>
        <p>{{ .Description }}</p>
      </a>
    </div>
    {{ end }}
  </div>
</div>
{{ end }}
